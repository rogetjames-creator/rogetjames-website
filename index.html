        <h1>ROGETjames — Laser Cut Wall Art & Sculpture</h1>
        <p>Original bespoke laser cut wall art, sculpture, architectural screens, gates, and fire features by James Roget. Crafted in Australia for architects, designers and discerning spaces.</p>
        <h2>The Collection</h2>
        <p>Over 60 original designs across wall art, sculpture, architectural screens, gates, fencing, and fire features in Corten steel and powdercoated aluminium.</p>
        <ul>
          <li>Wall Art — GREN Edge, GREN Tao, BANKSIA, BIRDY NUM NUM, DANDELIONS, DIAMOND BLOOM, FEATHER, PLUME DECO, FERLICI, BAMBU, UBUD Round, RUE the 3rd, WANDOO, KYRA LEAF</li>
          <li>Sculpture — AUTUMN LEAF, VILLA LEAF, MARAKESH TRIO, ORIAN Totem, DANDELIONS Totems, HOMEBASE, HUE</li>
          <li>Screens — VUELTA, ASLYIAM, ERGO, FERLIE, GRAIL, LUCARIO, LUMIER, XAVIER, WATTLE, VAYA</li>
          <li>Fire &amp; Light — REEDS of UNGARO, EQUISETTI, URCHIN, HOMEBASE Fire Pit, TOTEMS, YAZAD Fire</li>
          <li>Bespoke &amp; Commissions — BENIN Inspired, CREEPING FIG, RAVI Inspired, Centennial Park, Fiona Stanley Hospital, Unity in Diversity</li>
        </ul>
        <h2>About</h2>
        <p>With over 18 years in laser-cut design, James Roget led Q DESIGN Architectural Features — one of Australia's top-tier laser art companies — from 2008 to 2015, before establishing his independent studio. Today, ROGETjames operates from Perth, Gold Coast, and Melbourne.</p>
