[build]
  command = "npm run build:quick"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

# Send the auto-generated Netlify subdomain to the canonical domain so
# rogetjames-new.netlify.app is not indexed as a duplicate of the live site.
# (Deploy-preview subdomains have a different host and are unaffected.)
[[redirects]]
  from = "https://rogetjames-new.netlify.app/*"
  to = "https://rogetjames.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/chat-transcript"
  to = "/.netlify/functions/chat-transcript"
  status = 200

[[redirects]]
  from = "/api/vault-invite"
  to = "/.netlify/functions/vault-invite"
  status = 200

[[redirects]]
  from = "/api/vault-verify"
  to = "/.netlify/functions/vault-verify"
  status = 200

[[redirects]]
  from = "/vault"
  to = "/vault.html"
  status = 200

[[redirects]]
  from = "/stats"
  to = "/stats.html"
  status = 200

[[redirects]]
  from = "/api/track-event"
  to = "/.netlify/functions/track-event"
  status = 200

[[redirects]]
  from = "/api/stats-data"
  to = "/.netlify/functions/stats-data"
  status = 200

# Security headers — applied to every route. The CSP allows only the sources
# the site actually uses (self, Google Fonts, the myportfolio image CDN); there
# are no iframes, workers or eval in the site, so this does not break anything.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://cdn.myportfolio.com; media-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'"

# Cache immutable hashed assets for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 30 days
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Cache videos for 30 days
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Cache fonts for 1 year
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — short cache, always revalidate
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
