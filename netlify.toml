[build]
  command = "npm run build:quick"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/vault-verify"
  to = "/.netlify/functions/vault-verify"
  status = 200

[[redirects]]
  from = "/api/vault-invite"
  to = "/.netlify/functions/vault-invite"
  status = 200

[[redirects]]
  from = "/vault"
  to = "/vault.html"
  status = 200
